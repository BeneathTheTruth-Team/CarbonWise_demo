version: '3.8'

services:
  # ==================== Flask应用服务 ====================
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: carbonwise-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=mysql+pymysql://carbonwise:${DB_PASSWORD}@mysql:3306/carbonwise_db?charset=utf8mb4
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./reports:/app/reports
    networks:
      - carbonwise-network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ==================== C++计算引擎服务 ====================
  engine:
    build:
      context: .
      dockerfile: Dockerfile.engine
    container_name: carbonwise-engine
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - ENGINE_MODE=standalone
      - MAX_WORKERS=4
      - QUEUE_SIZE=1000
    volumes:
      - ./engine-data:/data
    networks:
      - carbonwise-network
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 4G
        reservations:
          cpus: '2.0'
          memory: 1G

  # ==================== Nginx反向代理 ====================
  nginx:
    image: nginx:alpine
    container_name: carbonwise-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./static:/usr/share/nginx/html/static:ro
    depends_on:
      - api
    networks:
      - carbonwise-network

  # ==================== MySQL数据库 ====================
  mysql:
    image: mysql:8.0
    container_name: carbonwise-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=carbonwise_db
      - MYSQL_USER=carbonwise
      - MYSQL_PASSWORD=${DB_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./database_schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./init-data.sql:/docker-entrypoint-initdb.d/02-data.sql:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --innodb-buffer-pool-size=1G
      --max-connections=200
    networks:
      - carbonwise-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ==================== Redis缓存 ====================
  redis:
    image: redis:7-alpine
    container_name: carbonwise-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - carbonwise-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ==================== Prometheus监控 ====================
  prometheus:
    image: prom/prometheus:latest
    container_name: carbonwise-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - carbonwise-network

  # ==================== Grafana可视化 ====================
  grafana:
    image: grafana/grafana:latest
    container_name: carbonwise-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - carbonwise-network
    depends_on:
      - prometheus

  # ==================== Celery任务队列(可选) ====================
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: carbonwise-celery
    restart: unless-stopped
    command: celery -A tasks worker --loglevel=info --concurrency=4
    environment:
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/1
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/2
    env_file:
      - .env
    depends_on:
      - redis
      - mysql
    volumes:
      - ./logs:/app/logs
    networks:
      - carbonwise-network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G

# ==================== 网络与存储 ====================
networks:
  carbonwise-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
